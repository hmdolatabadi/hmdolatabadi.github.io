name: Update Pulse

on:
  schedule:
    # Every 6 hours, on the hour
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: pulse-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r pulse-fetch/requirements.txt

      - name: Fetch latest tweets
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: python pulse-fetch/fetch_pulse.py

      - name: Commit posts.json if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if git diff --quiet posts.json; then
            echo 'No changes to posts.json'
          else
            git add posts.json
            git commit -m 'Pulse: refresh from X timeline'
            git push
          fi
